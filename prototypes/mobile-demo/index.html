<!doctype html>
<html>
<head>
  <title>Ghost-Eye Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #060912;
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .card {
      background: #121a2b;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 8px;
    }
    .label {
      color: #8fa3c7;
    }
    .value {
      font-size: 28px;
      font-weight: bold;
    }
    button {
      width: 100%;
      padding: 18px;
      border: 0;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      background: #4da3ff;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Ghost-Eye</h1>
  <p>WiFi CSI sensing demo interface</p>

  <div class="card">
    <div class="label">Presence</div>
    <div class="value" id="presence">Waiting</div>
  </div>

  <div class="card">
    <div class="label">Motion Score</div>
    <div class="value" id="motion">0.00</div>
  </div>

  <div class="card">
    <div class="label">Zone</div>
    <div class="value" id="zone">Unknown</div>
  </div>

  <div class="card">
    <div class="label">Confidence</div>
    <div class="value" id="confidence">0%</div>
  </div>

  <button onclick="scan()">Run Scan</button>

  <script>
    async function scan() {
      const res = await fetch("http://localhost:8000/scan");
      const data = await res.json();

      document.getElementById("presence").innerText = data.presence;
      document.getElementById("motion").innerText = data.motion_score;
      document.getElementById("zone").innerText = data.zone;
      document.getElementById("confidence").innerText = Math.round(data.confidence * 100) + "%";
    }
  </script>
</body>
</html>
