<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abraxas GhostEye Demo</title>
  <style>
    :root {
      --bg: #05070a;
      --panel: #10151d;
      --panel-2: #161d28;
      --text: #f3f7fb;
      --muted: #8ea0b5;
      --accent: #69f0ff;
      --warn: #ffd166;
      --good: #72f2a1;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(105, 240, 255, 0.12), transparent 34%),
        linear-gradient(180deg, #05070a 0%, #0b1119 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 760px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 36px;
      background: linear-gradient(180deg, rgba(16,21,29,0.98), rgba(5,7,10,0.98));
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
      overflow: hidden;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand {
      line-height: 1.1;
    }

    .brand small {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
    }

    .brand h1 {
      margin: 4px 0 0;
      font-size: 26px;
    }

    .status-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(114,242,161,0.12);
      color: var(--good);
      font-size: 13px;
      border: 1px solid rgba(114,242,161,0.28);
    }

    .radar-card {
      background: radial-gradient(circle, rgba(105,240,255,0.20), rgba(22,29,40,0.94) 58%);
      border: 1px solid rgba(105,240,255,0.22);
      border-radius: 28px;
      padding: 26px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .radar {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 1px solid rgba(105,240,255,0.35);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar::before,
    .radar::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(105,240,255,0.20);
    }

    .radar::before {
      width: 125px;
      height: 125px;
    }

    .radar::after {
      width: 70px;
      height: 70px;
    }

    .dot {
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 26px var(--accent);
    }

    .presence {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .metric {
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 16px;
    }

    .metric label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric strong {
      font-size: 24px;
    }

    button {
      width: 100%;
      border: none;
      margin-top: 22px;
      padding: 17px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #69f0ff, #7c5cff);
      color: #02040a;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .notice {
      color: var(--warn);
      background: rgba(255,209,102,0.10);
      border: 1px solid rgba(255,209,102,0.22);
      padding: 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.45;
      margin-top: 18px;
    }

    .timestamp {
      color: var(--muted);
      font-size: 12px;
      margin-top: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="topbar">
      <div class="brand">
        <small>Abraxas</small>
        <h1>GhostEye</h1>
      </div>
      <div class="status-pill" id="apiStatus">Demo Mode</div>
    </section>

    <section class="radar-card">
      <div class="radar">
        <div class="dot" id="presenceDot"></div>
      </div>
      <div class="presence" id="presence">Awaiting scan</div>
    </section>

    <section class="grid">
      <div class="metric">
        <label>Motion Score</label>
        <strong id="motionScore">--</strong>
      </div>
      <div class="metric">
        <label>Confidence</label>
        <strong id="confidence">--</strong>
      </div>
      <div class="metric">
        <label>Zone</label>
        <strong id="zone">--</strong>
      </div>
      <div class="metric">
        <label>Mode</label>
        <strong id="mode">SIM</strong>
      </div>
    </section>

    <button onclick="runScan()">Run Controlled Scan</button>

    <div class="notice">
      Demo simulation only. For authorized, consent-based, controlled environments. Not for covert surveillance or unauthorized monitoring.
    </div>

    <div class="timestamp" id="timestamp">No scan yet</div>
  </main>

  <script>
    const API_URL = "http://localhost:8000/scan";

    function formatPresence(value) {
      return value
        .replaceAll("_", " ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    async function runScan() {
      const status = document.getElementById("apiStatus");
      status.textContent = "Scanning";

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        document.getElementById("presence").textContent = formatPresence(data.presence);
        document.getElementById("motionScore").textContent = data.motion_score;
        document.getElementById("confidence").textContent = data.confidence;
        document.getElementById("zone").textContent = data.zone.toUpperCase();
        document.getElementById("mode").textContent = data.mode.toUpperCase().slice(0, 3);
        document.getElementById("timestamp").textContent = data.timestamp;
        status.textContent = "Online";
      } catch (error) {
        status.textContent = "API Offline";
        document.getElementById("presence").textContent = "Backend not connected";
        document.getElementById("timestamp").textContent = "Start FastAPI at localhost:8000";
      }
    }

    setInterval(runScan, 3000);
    runScan();
  </script>
</body>
</html>
