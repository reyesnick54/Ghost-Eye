[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "wifi-radar"
version = "1.0.0"
description = "Human pose estimation through commodity WiFi signals using deep learning"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = ["wifi", "csi", "pose-estimation", "deep-learning", "computer-vision", "rf-sensing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "torch>=2.0",
    "torchvision>=0.15",
    "dash>=2.14",
    "plotly>=5.17",
    "pandas>=2.0",
    "opencv-python>=4.8",
    "scikit-learn>=1.3",
    "ffmpeg-python>=0.2",
    "websockets>=12.0",
    "dash-bootstrap-components>=1.5",
    "pyyaml>=6.0",
    "pygame>=2.5",
    "onnx>=1.15",
    "onnxruntime>=1.17",
    "tqdm>=4.66",
]

[project.optional-dependencies]
dev = [
    "black>=24.0",
    "isort>=5.13",
    "pylint>=3.0",
    "flake8>=7.0",
    "mypy>=1.8",
    "pre-commit>=3.6",
    "pytest>=8.0",
    "pytest-cov>=4.1",
]

[project.scripts]
wifi-radar = "main:main"

[tool.setuptools]
py-modules = ["main"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["wifi_radar*"]

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
