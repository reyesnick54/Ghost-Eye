# ─────────────────────────────────────────────────────────────────────────── #
# nginx-rtmp configuration for WiFi-Radar                                     #
#                                                                             #
# RTMP ingest:  rtmp://localhost:1935/live/<stream_key>                       #
# HLS playback: http://localhost:8080/hls/<stream_key>.m3u8                  #
# Stats:        http://localhost:8080/stat                                    #
# ─────────────────────────────────────────────────────────────────────────── #

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        application live {
            live on;
            record off;

            # Allow pushes only from the app container (Docker network)
            allow publish all;
            allow play   all;

            # HLS output for browser playback
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 30s;
            hls_cleanup on;

            # Notify endpoints (optional)
            # notify_method get;
        }
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;

        # HLS stream
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Server statistics (JSON-compatible)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # RTMP control API
        location /control {
            rtmp_control all;
        }

        # Health-check endpoint
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
